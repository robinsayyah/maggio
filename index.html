<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maggio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Maggio placeholder landing page." />
  <link rel="icon" type="image/png" href="images/favIconMaggio.png" />

  <!-- Poppins font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #ece7e2;
    --bg-deep: #d8cdc3;
    --panel: rgba(255, 252, 248, 0.74);
    --accent: #341100;
    --accent-soft: #6a4330;
    --text: #2d140a;
    --line: rgba(52, 17, 0, 0.16);
    --shadow: rgba(52, 17, 0, 0.14);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background-color: #f4eeea;
  }

  body {
    min-height: 100vh;
    margin: 0;
    font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(106, 67, 48, 0.2) 0, transparent 32%),
      radial-gradient(circle at bottom right, rgba(52, 17, 0, 0.08) 0, transparent 28%),
      linear-gradient(135deg, #f7f2ed 0%, var(--bg) 45%, var(--bg-deep) 100%);
    background-repeat: no-repeat;
    background-size: 100% 200%;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .content {
    width: 100%;
    max-width: 1120px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 48px;
  }

  .left {
    max-width: 520px;
  }

  .logo-word {
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
  }

  .logo-word img {
    width: clamp(88px, 10vw, 92px);
    height: clamp(88px, 10vw, 92px);
    display: block;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }

  .headline {
    font-size: clamp(24px, 3.5vw, 32px);
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }

  @media (max-width: 600px) {
    .subcopy br {
      display: none;
    }
  }

  .subcopy {
    font-size: 15px;
    line-height: 1.6;
    color: var(--accent-soft);
    max-width: 420px;
    margin-bottom: 24px;
  }

  .form-wrapper {
    max-width: 460px;
  }

  .form-shell {
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-radius: 20px;
    padding: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 18px 40px var(--shadow);
    backdrop-filter: blur(16px);
  }

  .form-shell input[type="email"],
  .form-shell input[type="text"] {
    width: 100%;
    border: 1px solid rgba(52, 17, 0, 0.1);
    background: rgba(255, 255, 255, 0.72);
    color: var(--text);
    padding: 12px 18px;
    font-size: 14px;
    border-radius: 8px;
    outline: none;
  }

  .form-shell input::placeholder {
    color: rgba(52, 17, 0, 0.45);
  }

  .form-shell button {
    border: none;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: var(--accent);
    color: #f7f2ed;
    border-radius: 8px;
    transition: filter 0.1s ease, transform 0.1s ease;
    width: 100%;
  }

  .form-shell button:hover {
    filter: brightness(1.05);
  }

  .form-shell button:active {
    transform: translateY(1px) scale(0.99);
    filter: brightness(0.96);
  }

  .form-note {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent-soft);
    opacity: 0.8;
  }

  .right {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .phone-frame {
    width: 100%;
    max-width: 420px;
  }

  .phone-frame img {
    width: 100%;
    display: block;
  }

  @media (max-width: 900px) {
    .content {
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .left {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .subcopy {
      text-align: center;
    }

    .form-wrapper {
      width: 100%;
    }

    .right {
      width: 100%;
      justify-content: center;
    }

    .phone-frame {
      max-width: 360px;
    }
  }
</style>

</head>
<body>
  <div class="page">
    <div class="content">
      <!-- LEFT SIDE -->
      <div class="left">
        <div class="logo-word">
          <img src="images/favIconMaggio.png" alt="Maggio logo" />
        </div>
        <h1 class="headline">Maggio - plan easily. </h1>
        <p class="subcopy">
          Maggio makes planning events and gatherings easier.<br>
          Join the waitlist!
        </p>

        <div class="form-wrapper">

          <!-- Hidden iframe to prevent Google redirect -->
          <iframe name="hidden_iframe" style="display:none;"></iframe>

<form class="form-shell"
      action="https://docs.google.com/forms/d/e/1FAIpQLSezPRHZKwQPZwN74G7hkuwp08kGXntqIaHH370LQXWBQ8bS_g/formResponse"
      method="POST"
      target="hidden_iframe"
      onsubmit="alert('Thanks! Your placeholder signup was submitted.'); setTimeout(() => this.reset(), 100);">

  <!-- REQUIRED GOOGLE HIDDEN FIELDS -->
  <input type="hidden" name="fvv" value="1">
  <input type="hidden" name="partialResponse" value="[null,null,&quot;1098064527202758570&quot;]">
  <input type="hidden" name="pageHistory" value="0">
  <input type="hidden" name="fbzx" value="1098064527202758570">

  
  <!-- AIRLINE -->
  <input
    type="text"
    name="entry.972524870"
    placeholder="Full Name"
    required
  />

  <!-- EMAIL -->
  <input
    type="email"
    name="entry.296163115"
    placeholder="Enter your email"
    required
    autocomplete="email"
  />


  <button type="submit">Join waitlist</button>
</form>

          <p class="form-note">
            
          </p>
        </div>
      </div>

      <!-- RIGHT SIDE IMAGE -->
      <div class="right">
        <div class="phone-frame">
          <img src="images/screenLog.png" alt="Maggio app preview placeholder" />
        </div>
      </div>

    </div>
  </div>
</body>
</html>
